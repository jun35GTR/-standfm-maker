<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタンドFM 自己紹介台本メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --accent: #e8c84a;
  --accent2: #c9a82e;
  --text: #f0ede6;
  --text2: #999;
  --text3: #666;
  --radius: 12px;
  --font: 'Zen Kaku Gothic New', sans-serif;
  --serif: 'Shippori Mincho', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.7;
}
.noise {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}
.page { position: relative; z-index: 1; max-width: 660px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

/* HERO */
.hero { text-align: center; margin-bottom: 3.5rem; }
.hero-tag {
  display: inline-block; font-size: 11px; letter-spacing: 0.15em;
  color: var(--accent); border: 1px solid rgba(232,200,74,0.3);
  padding: 4px 14px; border-radius: 99px; margin-bottom: 1.5rem;
  text-transform: uppercase;
}
.hero h1 {
  font-family: var(--serif); font-size: clamp(28px, 6vw, 42px);
  font-weight: 600; line-height: 1.3; margin-bottom: 1rem;
  color: var(--text);
}
.hero h1 span { color: var(--accent); }
.hero p { font-size: 15px; color: var(--text2); max-width: 460px; margin: 0 auto; }

/* PROGRESS */
.progress-wrap { margin-bottom: 2rem; }
.progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.progress-bar { height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

/* CARD */
.q-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2rem; margin-bottom: 1.5rem;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.q-num { font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 8px; }
.q-text { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
.q-hint { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }

textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; font-size: 15px; font-family: var(--font);
  color: var(--text); resize: vertical; min-height: 100px; line-height: 1.6;
  outline: none; transition: border-color 0.2s;
}
textarea:focus { border-color: rgba(232,200,74,0.5); }
textarea::placeholder { color: var(--text3); }

/* TONE */
.tone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tone-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.tone-card:hover { border-color: var(--border2); }
.tone-card.sel { border-color: var(--accent); background: rgba(232,200,74,0.07); }
.tone-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.tone-card.sel .tone-name { color: var(--accent); }
.tone-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }

/* BUTTONS */
.btn-row { display: flex; justify-content: space-between; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px; font-size: 14px; font-weight: 500; font-family: var(--font);
  border: 1px solid var(--border2); border-radius: 8px;
  background: transparent; color: var(--text); cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.97); }
.btn-p {
  background: var(--accent); border-color: var(--accent);
  color: #000; font-weight: 700;
}
.btn-p:hover { background: var(--accent2); border-color: var(--accent2); }

/* DONE */
.done-wrap { display: none; animation: slideIn 0.4s ease; }
.done-title { font-family: var(--serif); font-size: 28px; font-weight: 600; margin-bottom: 0.5rem; }
.done-sub { font-size: 14px; color: var(--text2); margin-bottom: 2rem; line-height: 1.6; }
.instruction {
  background: rgba(232,200,74,0.08); border: 1px solid rgba(232,200,74,0.2);
  border-radius: var(--radius); padding: 1.25rem 1.5rem;
  font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 1.5rem;
}
.instruction ol { padding-left: 1.25rem; }
.instruction li { margin-bottom: 4px; }
.result-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem;
  font-size: 13px; color: var(--text2); white-space: pre-wrap;
  line-height: 1.9; max-height: 320px; overflow-y: auto;
  margin-bottom: 1.5rem;
}
.copy-btn-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
.copied { color: var(--accent); font-size: 13px; display: none; align-items: center; gap: 4px; }

/* FOOTER */
.footer { text-align: center; font-size: 12px; color: var(--text3); margin-top: 4rem; }
.footer span { color: var(--accent); }
</style>
</head>
<body>
<div class="noise"></div>
<div class="page">

  <div class="hero">
    <div class="hero-tag">Stand FM</div>
    <h1>自己紹介<span>台本</span>メーカー</h1>
    <p>質問に答えるだけで、30分以上の自己紹介音声台本が完成します。</p>
  </div>

  <div id="quiz-wrap">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="step-lbl">ステップ 1 / 13</span>
        <span id="pct-lbl">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-num" id="q-num">QUESTION 01</div>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
      <div id="q-inp"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-back" onclick="back()" style="visibility:hidden">← 戻る</button>
      <button class="btn btn-p" id="btn-next" onclick="next()">次へ →</button>
    </div>
  </div>

  <div class="done-wrap" id="done-wrap">
    <div class="done-title">入力完了です</div>
    <p class="done-sub">以下の手順でClaude（AI）に台本を作ってもらいましょう。</p>
    <div class="instruction">
      <ol>
        <li>下の「回答をコピーする」ボタンを押す</li>
        <li><a href="https://claude.ai" target="_blank" style="color:var(--accent)">claude.ai</a> を開く（無料アカウントでOK）</li>
        <li>コピーした内容をそのまま貼り付けて送信する</li>
        <li>Claudeが30分以上の台本を作ってくれます</li>
      </ol>
    </div>
    <div class="result-box" id="result-box"></div>
    <div class="copy-btn-wrap">
      <button class="btn btn-p" onclick="copyAll()">回答をコピーする</button>
      <div class="copied" id="copied-msg">✓ コピーしました</div>
    </div>
  </div>

  <div class="footer">
    <span>No Music No Life</span> — スタンドFM台本メーカー
  </div>
</div>

<script>
const tones = [
  {id:"warm", name:"あたたかく・語りかける", desc:"友達に話すような自然なトーン"},
  {id:"passion", name:"熱く・情熱的", desc:"想いをストレートに届けるスタイル"},
  {id:"calm", name:"落ち着いた・丁寧", desc:"信頼感を積み上げる大人な話し方"},
  {id:"casual", name:"ゆるく・フラット", desc:"肩の力を抜いた日常会話スタイル"}
];
const qs = [
  {id:"tone", type:"tone", text:"あなたのトーンを選んでください", hint:"聴いてくれる人にどんな印象を持ってほしいですか？"},
  {id:"name", type:"text", text:"ラジオネーム（お名前）を教えてください", hint:"例：たろう、はな、ゆうき など。本名でも活動名でもOK。"},
  {id:"location", type:"text", text:"どこにお住まいですか？", hint:"例：福岡、東京、地方在住 など"},
  {id:"job", type:"text", text:"お仕事・肩書きを教えてください", hint:"例：会社員、フリーランス、主婦しながら副業中 など"},
  {id:"hobby", type:"text", text:"趣味や好きなことは何ですか？", hint:"複数あれば全部どうぞ。音楽・スポーツ・読書・車など。"},
  {id:"music", type:"text", text:"音楽とのかかわりを教えてください", hint:"好きなジャンル、楽器経験、音楽にまつわるエピソードなど。"},
  {id:"past", type:"text", text:"人生で印象に残っている経験や転機はありますか？", hint:"仕事・家族・挑戦・失敗・出会いなど、何でも。"},
  {id:"why", type:"text", text:"スタンドFMを始めようと思ったきっかけは？", hint:"誰かに勧められた、発信したいことができた、興味があった など。"},
  {id:"theme", type:"text", text:"どんなテーマで配信していきたいですか？", hint:"例：音楽・働き方・子育て・副業・人生のリブート など"},
  {id:"listener", type:"text", text:"どんな人に届けたいですか？", hint:"具体的な人物像があるとベスト。例：40代で人生に迷っている人"},
  {id:"message", type:"text", text:"リスナーに一番伝えたいメッセージは？", hint:"この配信を通じて届けたい想いを教えてください。"},
  {id:"challenge", type:"text", text:"不安なこと・楽しみにしていることは？", hint:"正直な気持ちでOKです。それがリスナーへの共感になります。"},
  {id:"catch", type:"text", text:"キャッチフレーズや好きな言葉があれば", hint:"なければ「なし」でOKです。"}
];

let cur=0, ans={}, selTone=null;

function render(){
  const q=qs[cur], tot=qs.length;
  const pct=Math.round(cur/tot*100);
  document.getElementById("prog").style.width=pct+"%";
  document.getElementById("step-lbl").textContent="ステップ "+(cur+1)+" / "+tot;
  document.getElementById("pct-lbl").textContent=pct+"%";
  document.getElementById("q-num").textContent="QUESTION "+String(cur+1).padStart(2,"0");
  document.getElementById("q-text").textContent=q.text;
  document.getElementById("q-hint").textContent=q.hint;
  document.getElementById("btn-back").style.visibility=cur>0?"visible":"hidden";
  document.getElementById("btn-next").textContent=cur===tot-1?"完成させる →":"次へ →";
  const inp=document.getElementById("q-inp");
  if(q.type==="tone"){
    inp.innerHTML='<div class="tone-grid">'+tones.map(t=>`<div class="tone-card${selTone===t.id?' sel':''}" onclick="pickTone('${t.id}')"><div class="tone-name">${t.name}</div><div class="tone-desc">${t.desc}</div></div>`).join("")+"</div>";
  } else {
    inp.innerHTML=`<textarea id="ans-inp" placeholder="ここに入力してください…">${ans[q.id]||""}</textarea>`;
    setTimeout(()=>{const a=document.getElementById("ans-inp");if(a)a.focus();},50);
  }
}

function pickTone(id){selTone=id;ans.tone=id;render();}

function next(){
  const q=qs[cur];
  if(q.type==="tone"){if(!selTone){alert("トーンを選んでください");return;}}
  else{const v=document.getElementById("ans-inp").value.trim();if(!v){alert("入力してください");return;}ans[q.id]=v;}
  cur++;
  if(cur>=qs.length) finish();
  else render();
}

function back(){if(cur>0){cur--;render();}}

function finish(){
  const toneLabel=tones.find(t=>t.id===ans.tone)?.name||"";
  const labels={tone:"トーン",name:"ラジオネーム",location:"居住地",job:"仕事・肩書き",hobby:"趣味・好きなこと",music:"音楽とのかかわり",past:"印象に残る経験・転機",why:"始めた理由",theme:"配信テーマ",listener:"届けたい人",message:"伝えたいメッセージ",challenge:"不安・楽しみ",catch:"キャッチフレーズ"};
  let text="以下の情報でスタンドFMの自己紹介台本を作ってください。話し言葉で、30分以上の分量でお願いします。\n\n";
  qs.forEach(q=>{
    const val=q.id==="tone"?toneLabel:(ans[q.id]||"");
    if(val) text+=`【${labels[q.id]}】${val}\n`;
  });
  document.getElementById("quiz-wrap").style.display="none";
  document.getElementById("done-wrap").style.display="block";
  document.getElementById("result-box").textContent=text;
  window.scrollTo({top:0,behavior:"smooth"});
}

function copyAll(){
  const t=document.getElementById("result-box").textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const el=document.getElementById("copied-msg");
    el.style.display="flex";
    setTimeout(()=>{el.style.display="none";},3000);
  });
}

render();
</script>
</body>
</html>
